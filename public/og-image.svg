<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a1412"/>
  
  <!-- Gradient mesh -->
  <ellipse cx="200" cy="315" rx="400" ry="350" fill="#00ff9c" fill-opacity="0.05"/>
  <ellipse cx="1000" cy="200" rx="350" ry="250" fill="#00c8ff" fill-opacity="0.04"/>
  <ellipse cx="800" cy="500" rx="300" ry="200" fill="#a78bfa" fill-opacity="0.03"/>
  
  <!-- Accent line -->
  <rect x="80" y="200" width="4" height="230" rx="2" fill="#00ff9c"/>
  
  <!-- Name -->
  <text x="120" y="290" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="48" font-weight="bold" fill="#ebebeb">
    Yash Ambarraj Bagal
  </text>
  
  <!-- Glow line under name -->
  <rect x="120" y="310" width="280" height="2" rx="1" fill="#00ff9c" opacity="0.4"/>
  
  <!-- Role -->
  <text x="120" y="360" font-family="'Inter', 'Segoe UI', sans-serif" font-size="24" fill="#00ff9c">
    Backend Developer
  </text>
  <text x="120" y="395" font-family="'Inter', 'Segoe UI', sans-serif" font-size="18" fill="#888">
    Java Spring Boot · Rust · AI/LLM Systems · Open Source
  </text>
  
  <!-- Tag at bottom -->
  <rect x="120" y="440" width="160" height="32" rx="16" fill="#00ff9c" fill-opacity="0.1" stroke="#00ff9c" stroke-opacity="0.3" stroke-width="1"/>
  <text x="200" y="461" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#00ff9c" text-anchor="middle">
    omarchy-os-portfolio
  </text>
  
  <!-- Decorative dots -->
  <circle cx="1100" cy="100" r="3" fill="#00ff9c" opacity="0.3"/>
  <circle cx="1050" cy="150" r="2" fill="#00c8ff" opacity="0.2"/>
  <circle cx="1120" cy="200" r="4" fill="#a78bfa" opacity="0.2"/>
  <circle cx="1080" cy="400" r="2" fill="#00ff9c" opacity="0.15"/>
  <circle cx="1120" cy="500" r="3" fill="#00c8ff" opacity="0.2"/>
</svg>
